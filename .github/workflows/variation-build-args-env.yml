name: Variation Build Args Env

on:
  workflow_dispatch:

concurrency:
  group: variation-build-args-env-${{ github.ref }}
  cancel-in-progress: true

jobs:
  env-build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        env_name: [production, staging]
    steps:
      # ---------------- PSE Setup ----------------
      - name: Setup PSE
        uses: invisirisk/pse-action@develop
        with:
          api_url: "https://app.stage.invisirisk.com"
          app_token: ${{ secrets.IR_API_KEY }}
          mode: docker-intercept
      # ---------------- PSE Setup End ----------------

      - name: Checkout
        uses: actions/checkout@v4

      - name: Build env-specific image
        run: |
          docker build \
            -f docker/Dockerfile.env-args \
            --build-arg NODE_ENV=${{ matrix.env_name }} \
            -t sample-docker-build:env-${{ matrix.env_name }} \
            .
      
      - name: Assert NODE_ENV in container
        run: |
          docker build -t my-app:latest --build-arg BUILDKIT_SYNTAX=public.ecr.aws/w3c0c0n7/invisirisk/baf-buildkit:dev-test --secret id=pse-ca,src=/etc/ssl/certs/pse.pem --build-arg PSE_PROXY=http://${PSE_PROXY_IP}:3128 --rm sample-docker-build:env-${{ matrix.env_name }} node -e "if (process.env.NODE_ENV !== '${{ matrix.env_name }}') { process.exit(1) }"

      # ---------------- PSE Cleanup ----------------
      - name: Cleanup PSE
        if: always()
        uses: invisirisk/pse-action@develop
        with:
          cleanup: "true"
      # ---------------- PSE Cleanup End ----------------
