name: Dispatch All Workflows

on:
  workflow_dispatch:
    inputs:
      target_ref:
        description: Branch or tag to run workflows on
        required: false
        default: main

permissions:
  actions: write
  contents: read

concurrency:
  group: dispatch-all-${{ github.ref }}
  cancel-in-progress: true

jobs:
  dispatch:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        workflow:
          - docker-build.yml
          - variation-core.yml
          - variation-docker-advanced.yml
          - variation-nondocker.yml
          - variation-pipeline-stages.yml
          - variation-reusable-caller.yml
          - variation-security-supplychain.yml
          - variation-compose-e2e.yml
          - variation-path-filter.yml
          - variation-scheduled-maintenance.yml
          - variation-self-hosted-optional.yml
          - variation-branch-behavior.yml
          - variation-build-args-env.yml

    steps:
      - name: Dispatch workflow
        uses: actions/github-script@v7
        with:
          script: |
            const workflow_id = '${{ matrix.workflow }}';
            const ref = '${{ inputs.target_ref }}' || context.ref.replace('refs/heads/', '');
            await github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id,
              ref,
              inputs: {}
            });
            core.info(`Dispatched ${workflow_id} on ref ${ref}`);

      - name: Add summary
        run: echo "Dispatched ${{ matrix.workflow }}" >> $GITHUB_STEP_SUMMARY
