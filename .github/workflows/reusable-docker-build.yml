name: Reusable Docker Build

on:
  workflow_call:
    inputs:
      variant_id:
        required: true
        type: string
      dockerfile:
        required: true
        type: string
      context:
        required: true
        type: string
      image_tag:
        required: true
        type: string
      smoke_port:
        required: false
        type: string
        default: "18110"

jobs:
  build-smoke:
    runs-on: ubuntu-latest
    steps:
      # ---------------- PSE Setup ----------------
      - name: Setup PSE
        uses: invisirisk/pse-action@develop
        with:
          api_url: "https://app.stage.invisirisk.com"
          app_token: ${{ secrets.IR_API_KEY }}
          mode: docker-intercept
        # Purpose: Set up PSE proxy/certificate interception for Docker builds
      # ---------------- PSE Setup End ----------------

      # Checkout repository
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: false
        # Purpose: Access Dockerfile and context

      # Build Docker image
      - name: Build image
        run: |
          docker build \
            -f "${{ inputs.dockerfile }}" \
            -t "sample-docker-build:${{ inputs.image_tag }}" \
            "${{ inputs.context }}"
        # Purpose: Build Docker image using inputs provided to the reusable workflow

      # Run smoke tests
      - name: Smoke
        uses: ./.github/actions/smoke-test
        with:
          image: sample-docker-build:${{ inputs.image_tag }}
          name: reusable-${{ inputs.variant_id }}
          host-port: ${{ inputs.smoke_port }}
        # Purpose: Run smoke test on the built image

      # ---------------- PSE Cleanup ----------------
      - name: Cleanup PSE
        if: always()
        uses: invisirisk/pse-action@develop
        with:
          cleanup: "true"
        # Purpose: Clean up PSE to remove proxy/certs after Docker build & tests
      # ---------------- PSE Cleanup End ----------------
